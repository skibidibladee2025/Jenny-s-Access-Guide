<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Redirect all 404s to index.html so client-side routing works
        var segments = window.location.pathname.split('/').filter(Boolean);
        var isRepo = segments[0] === 'Jenny-s-Access-Guide' || segments[0].includes('github');
        var newUrl = isRepo ? '/Jenny-s-Access-Guide/' : '/';
        window.location.replace(newUrl);
    </script>
</head>
<body>
    Redirecting to home...
</body>
</html>
