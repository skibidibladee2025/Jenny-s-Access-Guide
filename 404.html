<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Redirect all 404s to index.html so client-side routing works
        var path = window.location.pathname.replace(/\/$/, '');
        if (path && path !== '/Jenny-s-Access-Guide') {
            window.location.replace('/Jenny-s-Access-Guide/?redirect=' + encodeURIComponent(path));
        }
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
